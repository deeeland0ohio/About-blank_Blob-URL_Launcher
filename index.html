<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            gap: 20px;
            padding: 20px 0;
            box-sizing: border-box;
        }
        .info-text {
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        .container {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        label {
            color: #888;
            font-size: 14px;
            width: 140px; 
            box-sizing: border-box;
        }
        input[type="text"] {
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #444;
            background-color: #222;
            color: #fff;
            outline: none;
            width: 250px;
            height: 40px; 
            box-sizing: border-box;
        }
        textarea {
            padding: 10px 15px;
            border-radius: 14px;
            border: 1px solid #444;
            background-color: #222;
            color: #fff;
            outline: none;
            width: 250px;
            height: 120px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            resize: vertical;
            box-sizing: border-box;
            display: block;
        }
        textarea:focus, input[type="text"]:focus {
            border-color: #007bff;
        }
        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-weight: bold;
            width: 110px;
            height: 40px; 
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button:hover {
            background-color: #0056b3;
        }
        button.blob-btn {
            background-color: #28a745;
        }
        button.blob-btn:hover {
            background-color: #218838;
        }
        button.code-btn {
            background-color: #dc3545;
        }
        button.code-btn:hover {
            background-color: #bd2130;
        }
    </style>
</head>
<body>

    <div class="info-text">Https:// is recommended for it to work properly</div>

    <div class="container">
        <label>About:Blank</label>
        <input type="text" value="" placeholder="https://example.com" id='input' autofocus>
        <button onclick='create()'>Launch</button>
    </div>

    <div class="container">
        <label>Blob URL</label>
        <input type="text" value="" placeholder="https://example.com" id='blobInput'>
        <button class="blob-btn" onclick='createBlob()'>Launch</button>
    </div>

    <div class="container">
        <label>Html in About:blank</label>
        <textarea placeholder="Type or paste your HTML code here..." id="codeEditor"></textarea>
        <button class="code-btn" onclick="runCustomCode()">Launch</button>
    </div>

    <script>
        function formatUrl(inputElement) {
            let url = inputElement.value.trim();
            
            if (!url) {
                inputElement.value = '';
                return '';
            }

            const protocolRegex = /^(https?|htps?|ttps?|hp?tps?):?\/*(.*?)$/i;
            const match = url.match(protocolRegex);

            if (url.startsWith('https://') || url.startsWith('http://')) {
                return url;
            }

            if (match) {
                const domainAndPath = match[2];
                if (!domainAndPath) {
                    url = 'https://' + url;
                } else {
                    url = 'https://' + domainAndPath;
                }
            } else {
                url = 'https://' + url;
            }

            inputElement.value = url;
            return url;
        }

        function create() {
            var inputEl = document.getElementById('input');
            var url = formatUrl(inputEl);
            if (!url) return;

            var win = window.open();
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.margin = '0';
            iframe.src = url;
            
            win.document.body.appendChild(iframe);
        }

        function createBlob() {
            var inputEl = document.getElementById('blobInput');
            var url = formatUrl(inputEl);
            if (!url) return;

            var htmlContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta name="referrer" content="no-referrer">
                    <title>Loading...</title>
                    <style>
                        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
                        iframe { border: none; width: 100%; height: 100%; }
                    </style>
                    <script>
                        if (window.opener) {
                            window.opener = null;
                        }
                    <\/script>
                </head>
                <body>
                    <iframe src="${url}" allow="fullscreen"></iframe>
                </body>
                </html>
            `;
            
            var blob = new Blob([htmlContent], { type: 'text/html' });
            var blobUrl = URL.createObjectURL(blob);
            
            var newWindow = window.open();
            if (newWindow) {
                newWindow.opener = null;
                newWindow.location.href = blobUrl;
            }
        }

        function runCustomCode() {
            const editorEl = document.getElementById('codeEditor');
            const userCode = editorEl.value;
            
            if (!userCode.trim()) {
                editorEl.value = '';
                return;
            }

            const newWindow = window.open('about:blank', '_blank');
            
            if (newWindow) {
                newWindow.document.open();
                newWindow.document.write(userCode);
                newWindow.document.close();
            } else {
                alert('Pop-up blocked! Please allow pop-ups for this page to see the preview.');
            }
        }
    </script>
</body>
</html>
